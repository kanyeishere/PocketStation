name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*.[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    env:
      DALAMUD_HOME: ${{ github.workspace }}\lib

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ github.token }}

      - name: Update version from tag
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          Write-Host "Tag: $tag → Version: $version"

          $pm = Get-Content -Raw "pluginmaster.json" | ConvertFrom-Json
          $pm[0].AssemblyVersion = $version
          $pm[0].TestingAssemblyVersion = $version
          $pm | ConvertTo-Json | Set-Content "pluginmaster.json"

          $ps = Get-Content -Raw "PocketStation.json" | ConvertFrom-Json
          $ps.AssemblyVersion = $version
          $ps | ConvertTo-Json | Set-Content "PocketStation.json"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json PocketStation.json
          git commit -m "Bump version to $version [skip ci]"
          git push

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build Plugin
        run: dotnet build --configuration Release /p:DalamudDevPath="${{ github.workspace }}\lib"

      - name: Package Plugin
        run: |
          Compress-Archive -Path "bin\Release\*" -DestinationPath "latest.zip" -Force
          if (-not (Test-Path "latest.zip")) { throw "latest.zip was not created!" }
          Write-Host "latest.zip created: $(Get-Item latest.zip | Select-Object Length)"

      - name: Generate pluginmaster_entry.json (release artifact)
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $repoUrl = "${{ github.server_url }}/${{ github.repository }}"
          $downloadUrl = "$repoUrl/releases/latest/download/latest.zip"

          $entry = @{
            Author                 = "Yiwei"
            Name                   = "Pocket Station"
            Punchline              = "LAN mobile console for chat, player state, commands, and screenshots."
            Description            = "Runs a local LAN web console for monitoring game chat and player state, sending whitelisted chat commands, and requesting live screenshots."
            InternalName           = "PocketStation"
            AssemblyVersion        = $version
            TestingAssemblyVersion = $version
            ApplicableVersion      = "any"
            Tags                   = @("chat", "lan", "mobile", "monitor")
            DalamudApiLevel        = 15
            RepoUrl                = $repoUrl
            DownloadLinkInstall    = $downloadUrl
            DownloadLinkTesting    = $downloadUrl
            DownloadLinkUpdate     = $downloadUrl
          }

          $entry | ConvertTo-Json | Set-Content "pluginmaster_entry.json"
          Write-Host "=== pluginmaster_entry.json ==="
          Get-Content "pluginmaster_entry.json"

          if (-not (Test-Path "pluginmaster_entry.json")) { throw "pluginmaster_entry.json was not created!" }

      - name: Create Release & Upload Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $existing = gh release view "$tag" --json id 2>$null
          if ($existing) {
            Write-Host "Release $tag already exists, uploading additional assets..."
          } else {
            Write-Host "Creating new release $tag..."
            gh release create "$tag" `
              --title "$tag" `
              --generate-notes `
              --latest
          }

          Write-Host "Uploading latest.zip..."
          gh release upload "$tag" "latest.zip" --clobber

          Write-Host "Uploading pluginmaster_entry.json..."
          gh release upload "$tag" "pluginmaster_entry.json" --clobber

          Write-Host "All assets uploaded successfully."
